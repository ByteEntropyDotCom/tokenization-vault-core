name: Tokenization Vault CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  verify-and-build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the source code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Java 21 (Temurin distribution)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 3. Compile and Run Tests
      # This ensures FpeEngineTest and VaultConcurrencyTest pass
      - name: Maven Test & Package
        run: mvn clean package

      # 4. Set up Docker Buildx
      # Modern builder that supports multi-stage builds and caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. Build Docker Image (No Push)
      # We use 'load: true' to pull the image into the local Docker daemon 
      # for verification, but it is never pushed to a registry.
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: tokenization-vault-core:latest
          load: true

      # 6. Verify the image exists in the local runner
      - name: Docker Image Check
        run: docker images | grep tokenization-vault-core
